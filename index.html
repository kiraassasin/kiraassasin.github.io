<style>
/* ── LOADING SCREEN ── */
#page-loader {
  position:fixed;inset:0;
  background:#0a0a0a;
  display:flex;align-items:center;justify-content:center;
  z-index:99999;
  transition:opacity 0.6s ease, visibility 0.6s ease;
}
#page-loader.hidden { opacity:0;visibility:hidden;pointer-events:none; }
.loader-inner {
  display:flex;flex-direction:column;align-items:center;gap:20px;
}
.loader-logo {
  font-family:'Cormorant Garamond',serif;
  font-size:1.6rem;font-weight:300;letter-spacing:0.12em;
  color:rgba(255,255,255,0.7);
  text-transform:uppercase;
}
.loader-bar {
  width:48px;height:1px;
  background:rgba(255,255,255,0.1);
  border-radius:1px;overflow:hidden;position:relative;
}
.loader-bar::after {
  content:'';position:absolute;top:0;left:-100%;
  width:100%;height:100%;
  background:var(--accent,#c8a96e);
  animation:loaderSlide 1s ease infinite;
}
@keyframes loaderSlide { 0%{left:-100%} 100%{left:100%} }

/* ── THEME / COLOR VARS ── */
:root {
  --accent:#c8a96e;
  --accent-rgb:200,169,110;
  --bg:#0a0a0a;
  --bg2:#111111;
  --border:rgba(255,255,255,0.08);
  --text:#f0ede8;
  --text2:#9a9590;
  --text3:#5a5550;
  --nav-bg:rgba(10,10,10,0.75);
  --radius:10px;
  --ease:cubic-bezier(0.4,0,0.2,1);
  --t:0.4s cubic-bezier(0.4,0,0.2,1);
}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-weight:300;line-height:1.65;transition:background 0.5s,color 0.5s;overflow-x:hidden}
img{-webkit-user-drag:none;user-select:none;pointer-events:none}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--accent);border-radius:2px}
::selection{background:rgba(var(--accent-rgb),0.25);color:var(--text)}

/* NAV */
nav{position:fixed;top:0;width:100%;padding:0 clamp(1.5rem,5vw,5rem);height:clamp(56px,5vw,72px);display:flex;align-items:center;justify-content:space-between;backdrop-filter:blur(18px) saturate(120%);-webkit-backdrop-filter:blur(18px) saturate(120%);background:var(--nav-bg);border-bottom:1px solid var(--border);z-index:1000;transition:background var(--t),border-color var(--t)}
.nav-logo{font-family:'Cormorant Garamond',serif;font-size:clamp(1.2rem,1.8vw,1.7rem);font-weight:600;letter-spacing:0.04em;color:var(--text);text-decoration:none;display:flex;align-items:center;gap:8px}
.nav-logo .dot{width:clamp(5px,0.7vw,8px);height:clamp(5px,0.7vw,8px);background:var(--accent);border-radius:50%;display:inline-block;margin-bottom:2px;transition:background var(--t)}
.nav-links{display:flex;align-items:center;gap:clamp(1.2rem,2.5vw,3rem);list-style:none}
.nav-links li a{font-size:clamp(0.72rem,0.85vw,0.92rem);letter-spacing:0.13em;text-transform:uppercase;color:var(--text2);text-decoration:none;position:relative;padding-bottom:2px;transition:color var(--t)}
.nav-links li a::after{content:'';position:absolute;bottom:-1px;left:0;width:0;height:1px;background:var(--accent);transition:width 0.3s ease}
.nav-links li a:hover{color:var(--text)}.nav-links li a:hover::after{width:100%}
.hamburger{display:none;flex-direction:column;gap:5px;padding:4px;background:none;border:none}
.hamburger span{display:block;width:22px;height:1.5px;background:var(--text);border-radius:2px;transition:transform 0.35s ease,opacity 0.3s}
.hamburger.open span:nth-child(1){transform:translateY(6.5px) rotate(45deg)}
.hamburger.open span:nth-child(2){opacity:0}
.hamburger.open span:nth-child(3){transform:translateY(-6.5px) rotate(-45deg)}
.mobile-menu{display:none;position:fixed;top:clamp(56px,5vw,72px);left:0;right:0;background:var(--bg2);border-bottom:1px solid var(--border);padding:1.5rem 2rem;z-index:999;flex-direction:column;gap:1rem;transform:translateY(-8px);opacity:0;transition:transform 0.3s ease,opacity 0.3s ease}
.mobile-menu.open{display:flex;transform:translateY(0);opacity:1}
.mobile-menu a{font-size:0.85rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--text2);text-decoration:none;padding:0.4rem 0;border-bottom:1px solid var(--border);transition:color var(--t)}
.mobile-menu a:hover{color:var(--accent)}
.settings-btn{background:none;border:1px solid var(--border);color:var(--text2);width:clamp(30px,2.5vw,40px);height:clamp(30px,2.5vw,40px);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:border-color var(--t),color var(--t)}
.settings-btn:hover{border-color:var(--accent);color:var(--accent)}
.settings-btn svg{width:clamp(13px,1.1vw,17px);height:clamp(13px,1.1vw,17px)}
.theme-panel{position:fixed;top:calc(clamp(56px,5vw,72px) + 8px);right:clamp(1rem,4vw,3rem);width:220px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:1.2rem;z-index:1100;display:none;box-shadow:0 20px 60px rgba(0,0,0,0.4);animation:panelIn 0.25s ease}
.theme-panel.open{display:block}
@keyframes panelIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.panel-label{font-size:0.7rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--text3);margin-bottom:0.7rem}
.theme-row{display:flex;gap:8px;margin-bottom:1rem}
.theme-btn{flex:1;padding:6px 0;font-size:0.75rem;letter-spacing:0.05em;border-radius:6px;border:1px solid var(--border);transition:border-color 0.25s;font-family:'DM Sans',sans-serif}
.theme-btn.dark{background:#0a0a0a;color:#f0ede8}.theme-btn.light{background:#f5f3ef;color:#1a1814}.theme-btn.active{border-color:var(--accent)}

/* HERO */
.hero{min-height:100svh;display:flex;align-items:center;justify-content:center;padding:clamp(90px,10vw,140px) 1.5rem clamp(3rem,6vw,6rem);position:relative;overflow:hidden}
.hero-bg{position:absolute;inset:0;background-size:cover;background-position:center;filter:blur(22px) brightness(0.55) saturate(0.7);transform:scale(1.08);z-index:-2;transition:filter 0.5s}
.hero-vignette{position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 20%,rgba(0,0,0,0.6) 100%);z-index:-1}
.hero-content{text-align:center;display:flex;flex-direction:column;align-items:center;gap:clamp(0.8rem,1.5vw,1.5rem)}
.profile-ring{position:relative;width:clamp(130px,17vw,240px);height:clamp(130px,17vw,240px);flex-shrink:0}
.profile-ring::before{content:'';position:absolute;inset:-4px;border-radius:50%;background:conic-gradient(from 0deg,var(--accent),transparent 40%,var(--accent) 70%,transparent);animation:spin 8s linear infinite;transition:background 0.5s}
@keyframes spin{to{transform:rotate(360deg)}}
.profile-ring img{position:relative;width:100%;height:100%;border-radius:50%;object-fit:cover;border:clamp(2px,0.3vw,4px) solid var(--bg);display:block}
.hero-content h1{font-family:'Cormorant Garamond',serif;font-size:clamp(2.4rem,6.5vw,7rem);font-weight:300;line-height:1.05;letter-spacing:-0.01em;color:#fff}
.hero-sub{font-size:clamp(0.72rem,1.1vw,1rem);letter-spacing:0.28em;text-transform:uppercase;color:var(--accent);transition:color var(--t)}
.hero-scroll{position:absolute;bottom:2rem;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:6px;opacity:0.6}
.hero-scroll span{font-size:clamp(0.58rem,0.7vw,0.75rem);letter-spacing:0.18em;text-transform:uppercase;color:var(--text2)}
.scroll-line{width:1px;height:clamp(28px,3vw,44px);background:linear-gradient(to bottom,var(--accent),transparent);animation:scrollPulse 2s ease infinite}
@keyframes scrollPulse{0%,100%{opacity:0.3;transform:scaleY(0.8)}50%{opacity:1;transform:scaleY(1)}}

/* SECTIONS */
section{padding:clamp(60px,9vw,130px) clamp(1.5rem,7vw,10%)}
.section-header{display:flex;align-items:center;gap:1rem;margin-bottom:clamp(2rem,4vw,4.5rem)}
.section-header h2{font-family:'Cormorant Garamond',serif;font-size:clamp(1.8rem,4vw,4rem);font-weight:300;letter-spacing:-0.01em;white-space:nowrap}
.section-line{flex:1;height:1px;background:linear-gradient(to right,var(--border),transparent)}
.section-num{font-size:clamp(0.65rem,0.8vw,0.85rem);letter-spacing:0.15em;color:var(--accent);font-weight:400;transition:color var(--t)}

/* ABOUT */
.about{background:var(--bg2);transition:background var(--t)}
.about-grid{display:grid;grid-template-columns:1fr 1fr;gap:clamp(2rem,5vw,6rem);align-items:center}
.about-text-col{display:flex;flex-direction:column;gap:clamp(0.9rem,1.5vw,1.5rem)}
.about-text-col p{font-size:clamp(0.88rem,1.3vw,1.08rem);color:var(--text2);line-height:1.85}
.about-accent-bar{display:flex;gap:clamp(1.5rem,3vw,3rem);padding:clamp(0.9rem,1.5vw,1.5rem) 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.about-stat{display:flex;flex-direction:column;gap:3px}
.about-stat strong{font-family:'Cormorant Garamond',serif;font-size:clamp(1.8rem,3vw,3.5rem);font-weight:400;color:var(--accent);line-height:1;transition:color var(--t)}
.about-stat span{font-size:clamp(0.65rem,0.8vw,0.82rem);letter-spacing:0.1em;text-transform:uppercase;color:var(--text3)}
.about-img-wrap{position:relative;border-radius:var(--radius);overflow:hidden;aspect-ratio:4/5}
.about-img-wrap img{width:100%;height:100%;object-fit:cover;transition:transform 0.65s ease}
.about-img-wrap:hover img{transform:scale(1.04)}
.about-img-wrap::after{content:'';position:absolute;inset:0;border:1px solid var(--border);border-radius:var(--radius);pointer-events:none}
.about-img-wrap::before{content:'';position:absolute;top:clamp(8px,1vw,14px);right:clamp(8px,1vw,14px);width:clamp(28px,3vw,50px);height:clamp(28px,3vw,50px);border-top:2px solid var(--accent);border-right:2px solid var(--accent);border-radius:0 4px 0 0;z-index:1;transition:border-color var(--t)}

/* GALLERY */
.gallery{background:var(--bg);transition:background var(--t)}
.gallery-filter{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:clamp(1.2rem,2vw,2.5rem)}
.filter-btn{font-family:'DM Sans',sans-serif;font-size:clamp(0.68rem,0.8vw,0.82rem);letter-spacing:0.12em;text-transform:uppercase;padding:clamp(5px,0.6vw,8px) clamp(12px,1.5vw,22px);border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);transition:background 0.25s,border-color 0.25s,color 0.25s}
.filter-btn:hover,.filter-btn.active{background:var(--accent);border-color:var(--accent);color:#0a0a0a}
.masonry{columns:3;column-gap:clamp(8px,1vw,14px)}
.masonry-item{break-inside:avoid;margin-bottom:clamp(8px,1vw,14px);position:relative;border-radius:var(--radius);overflow:hidden}
.masonry-item img{width:100%;display:block;border-radius:var(--radius);transition:transform 0.55s cubic-bezier(0.4,0,0.2,1)}
.masonry-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.7) 0%,transparent 50%);opacity:0;transition:opacity 0.35s ease;display:flex;align-items:flex-end;padding:clamp(10px,1.2vw,18px);border-radius:var(--radius)}
.masonry-overlay span{font-size:clamp(0.65rem,0.75vw,0.78rem);letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.85)}
.masonry-item:hover img{transform:scale(1.05)}.masonry-item:hover .masonry-overlay{opacity:1}
.masonry-item {
  will-change: transform;
  transform: translateZ(0);
}
/* LIGHTBOX */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,0.93);backdrop-filter:blur(20px) saturate(0.5);-webkit-backdrop-filter:blur(20px) saturate(0.5);z-index:9999;opacity:0;pointer-events:none;transition:opacity 0.3s ease}
.lightbox.active{opacity:1;pointer-events:all}
.lb-stage{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
.lb-stage img{max-width:88vw;max-height:86vh;object-fit:contain;border-radius:6px;user-select:none;transition:opacity 0.22s ease,transform 0.22s ease}
.lb-stage img.fade-out{opacity:0;transform:scale(0.97)}.lb-stage img.fade-in{opacity:1;transform:scale(1)}
.lb-close{position:absolute;top:clamp(12px,2.5vw,24px);right:clamp(12px,2.5vw,24px);width:clamp(34px,3vw,46px);height:clamp(34px,3vw,46px);background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:50%;color:white;font-size:clamp(15px,1.5vw,20px);display:flex;align-items:center;justify-content:center;z-index:10;transition:background 0.2s,transform 0.2s;line-height:1}
.lb-close:hover{background:rgba(255,255,255,0.18);transform:scale(1.1)}
.lb-nav{position:absolute;top:50%;transform:translateY(-50%);width:clamp(36px,3.5vw,50px);height:clamp(36px,3.5vw,50px);background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:50%;color:white;display:flex;align-items:center;justify-content:center;z-index:10;transition:background 0.2s;font-size:clamp(14px,1.2vw,18px)}
.lb-nav:hover{background:rgba(255,255,255,0.18)}
.lb-prev{left:clamp(12px,2.5vw,28px)}.lb-next-btn{right:clamp(12px,2.5vw,28px)}
.lb-dots{position:absolute;bottom:clamp(32px,4vw,50px);left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:10}
.lb-dot{width:5px;height:5px;background:rgba(255,255,255,0.25);border-radius:50%;transition:background 0.2s,transform 0.2s}
.lb-dot.active{background:var(--accent);transform:scale(1.4)}
.lb-counter{position:absolute;bottom:clamp(12px,1.8vw,20px);left:50%;transform:translateX(-50%);font-size:clamp(0.65rem,0.75vw,0.78rem);letter-spacing:0.15em;color:rgba(255,255,255,0.4);z-index:10}

/* FOOTER */
footer{padding:clamp(1.2rem,2vw,2.2rem) clamp(1.5rem,7vw,10%);background:var(--bg2);border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:0.5rem;transition:background var(--t)}
footer p{font-size:clamp(0.72rem,0.85vw,0.9rem);color:var(--text3)}
.footer-dot{width:6px;height:6px;background:var(--accent);border-radius:50%;transition:background var(--t)}
.reveal{opacity:0;transform:translateY(26px);transition:opacity 0.7s var(--ease),transform 0.7s var(--ease)}
.reveal.visible{opacity:1;transform:translateY(0)}
body.no-scroll{overflow:hidden}

@media(max-width:820px){.about-grid{grid-template-columns:1fr}.about-img-wrap{aspect-ratio:16/9;order:-1}.masonry{columns:2}.lb-nav{display:none}}
@media(max-width:600px){.masonry{columns:1}.nav-links{display:none}.hamburger{display:flex}}
</style>
</head>

<!-- LOADING SCREEN -->
<div id="page-loader">
  <div class="loader-inner">

</div>

<nav>

</div>

<section class="hero" id="hero">

<footer>
  <p id="footer-text"></p>
  <div class="footer-dot"></div>

<script>
'use strict';

/* ── SAFE INIT ── */
function applyFontSmoothing() {
    if (document.body) {
        document.body.style.webkitFontSmoothing = 'antialiased';
    }
}

if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', applyFontSmoothing, { once: true });
} else {
    applyFontSmoothing();
}

// Cegah klik kanan hanya pada gambar
document.addEventListener('contextmenu', function(e) {
    if (e.target && e.target.tagName === 'IMG') {
        e.preventDefault();
    }
});

/* ── DEFAULT CONFIGURATION ── */
const DEFAULT = Object.freeze({
    meta:    { title: 'kiraassassin' },
    theme:   { 
        mode: 'dark', 
        colors: { 
            accent: '#c8a96e', 
            bg: '#0a0a0a', 
            bg2: '#111111', 
            text: '#f0ede8', 
            text2: '#9a9590', 
            text3: '#5a5550' 
        } 
    },
    nav:     { logo: 'Kiraassassin' },

/* ── SECURE HTML SANITIZER ── */
function sanitizeText(text) {
    if (typeof text !== 'string') return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function safeSetText(element, text) {
    if (!element) return;
    element.textContent = text || '';
}

function safeSetHTML(element, html) {
    if (!element) return;
    element.innerHTML = html || '';
}

/* ── APPLY CUSTOM COLORS ── */
function applyColors(colors) {
    if (!colors || typeof colors !== 'object') return;
    
    const root = document.documentElement;
    
    try {
        const hexRegex = /^#([0-9A-Fa-f]{3}|[0-9A-Fa-f]{6})$/;
        
        const safeColors = {
            '--accent': colors.accent,
            '--bg': colors.bg,
            '--bg2': colors.bg2,
            '--text': colors.text,
            '--text2': colors.text2,
            '--text3': colors.text3
        };
        
        for (const [prop, value] of Object.entries(safeColors)) {
            if (value && hexRegex.test(value)) {
                root.style.setProperty(prop, value);
            }
        }
        
        if (colors.bg && hexRegex.test(colors.bg)) {
            const hex = colors.bg.replace('#', '');
            const r = parseInt(hex.slice(0, 2), 16);
            const g = parseInt(hex.slice(2, 4), 16);
            const b = parseInt(hex.slice(4, 6), 16);
            
            if (!isNaN(r) && !isNaN(g) && !isNaN(b)) {
                root.style.setProperty('--nav-bg', `rgba(${r},${g},${b},0.75)`);
                
                const loader = document.getElementById('page-loader');
                if (loader) {
                    loader.style.background = `rgb(${r},${g},${b})`;
                }
                
                const isDark = r < 128;
                root.style.setProperty('--border', isDark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.08)');
            }
        }
        
        if (colors.accent && hexRegex.test(colors.accent)) {
            const hex = colors.accent.replace('#', '');
            const r = parseInt(hex.slice(0, 2), 16);
            const g = parseInt(hex.slice(2, 4), 16);
            const b = parseInt(hex.slice(4, 6), 16);
            
            if (!isNaN(r) && !isNaN(g) && !isNaN(b)) {
                root.style.setProperty('--accent-rgb', `${r},${g},${b}`);
            }
        }
    } catch (err) {
        console.error('Error applying colors:', err);
    }
}

/* ── FIX IMAGE URL (Cloudinary optimization) ── */
function fixImgUrl(url) {
    if (!url || typeof url !== 'string') return '';
    
    const sanitized = url.replace(/[<>"']/g, '');
    
    try {
        new URL(sanitized);
    } catch (e) {
        return '';
    }
    
    if (sanitized.includes('res.cloudinary.com')) {
        if (!sanitized.includes('/upload/f_') && !sanitized.includes('/upload/q_')) {
            return sanitized.replace('/upload/', '/upload/f_auto,q_auto:eco/');
        }
    }
    
    return sanitized;
}

/* ── SHUFFLE ARRAY (Fisher-Yates Algorithm) ── */
function shuffleArray(array) {
    if (!Array.isArray(array)) return [];
    
    const shuffled = array.slice();
    
    for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }
    
    return shuffled;
}

/* ── RANDOMIZE GALLERY ITEMS ── */
function randomizeGallery(items) {
    if (!Array.isArray(items) || items.length === 0) return items;
    return shuffleArray(items);
}

/* ── GALLERY STATE ── */
const MAX_RENDER = 30;
let currentGalleryItems = [];
let visibleItems = [];
let loadedCount = MAX_RENDER;
let activeFilter = 'semua';
let lightboxVisible = [];
let lightboxIndex = 0;
let lightboxBusy = false;
let scrollTicking = false;

/* ── RENDER GALLERY ── */
window.addEventListener('scroll', () => {
    if (scrollTicking) return;
    scrollTicking = true;

    requestAnimationFrame(() => {
        scrollTicking = false;

        if (window.innerHeight + window.scrollY < document.body.offsetHeight - 500) return;
        
        const next = currentGalleryItems.slice(loadedCount, loadedCount + 20);
        if (!next.length) return;

        const masonry = document.getElementById('masonry');
        if (!masonry) return;

        next.forEach(item => {
            const div = document.createElement('div');
            div.className = 'masonry-item';
            div.dataset.cat = item.category;

            div.innerHTML = `
        <img src="${fixImgUrl(item.url)}" loading="lazy" decoding="async" fetchpriority="low">
        <div class="masonry-overlay"><span>${sanitizeText(item.label)}</span></div>
      `;

            div.style.willChange = 'transform, opacity';

            div.addEventListener('click', function() {
                const visible = getVisibleItems();
                const vi = visible.indexOf(div);
                if (vi >= 0) {
                    openLightbox(vi, visible);
                }
            });

            masonry.appendChild(div);
        });

        loadedCount += 20;
    });
});

function renderGallery(items, randomize = true) {
    const masonry = document.getElementById('masonry');
    if (!masonry) return;
    
    if (!Array.isArray(items)) {
        items = [];
    }
    
    if (randomize && items.length > 0) {
        currentGalleryItems = randomizeGallery(items);
    } else {
        currentGalleryItems = items.slice();
    }

    loadedCount = MAX_RENDER;
    visibleItems = currentGalleryItems.slice(0, MAX_RENDER);
    
    let galleryHTML = '';
    
    for (const item of visibleItems) {
        if (!item || typeof item !== 'object') continue;
        
        const safeUrl = fixImgUrl(item.url || '');
        const safeLabel = sanitizeText(item.label || '');
        const safeCategory = sanitizeText(item.category || 'semua');
        
        if (!safeUrl) continue;
        
        galleryHTML += `
            <div class="masonry-item" data-cat="${safeCategory}" style="pointer-events:auto;transition:opacity 0.3s,transform 0.3s">
                <img src="${safeUrl}" alt="${safeLabel}" loading="lazy" decoding="async" fetchpriority="low">
                <div class="masonry-overlay"><span>${safeLabel}</span></div>
            </div>`;
    }
    
    masonry.style.display = 'none';
    masonry.innerHTML = galleryHTML;
    masonry.style.display = '';
    
    const galleryItems = masonry.querySelectorAll('.masonry-item');
    galleryItems.forEach(function(item) {
        item.addEventListener('click', function() {
            const visible = getVisibleItems();
            const vi = visible.indexOf(item);
            if (vi >= 0) {
                openLightbox(vi, visible);
            }
        });
    });

    const firstImg = masonry.querySelector('img');
    if (firstImg) {
        const preImg = new Image();
        preImg.src = firstImg.src;
    }
    
    const filterBtns = document.querySelectorAll('.filter-btn');
    filterBtns.forEach(function(btn) {
        btn.onclick = function() {
            filterBtns.forEach(function(b) {
                b.classList.remove('active');
            });
            btn.classList.add('active');
            activeFilter = btn.dataset.filter || 'semua';
            filterGallery(activeFilter);
        };
    });
    
    const randomBtn = document.getElementById('randomizeBtn');
    if (randomBtn) {
        randomBtn.onclick = function() {
            if (currentGalleryItems.length > 0) {
                renderGallery(currentGalleryItems, true);
                activeFilter = 'semua';
                const filterBtns = document.querySelectorAll('.filter-btn');
                filterBtns.forEach(function(btn) {
                    btn.classList.toggle('active', btn.dataset.filter === 'semua');
                });
            }
        };
    }
    
    filterGallery(activeFilter);
}

/* ── GET VISIBLE ITEMS ── */
function getVisibleItems() {
    const items = document.querySelectorAll('.masonry-item');
    return Array.from(items).filter(function(item) {
        return item.style.display !== 'none';
    });
}

/* ── FILTER GALLERY ── */
function filterGallery(category) {
    const items = document.querySelectorAll('.masonry-item');
    if (!items.length) return;
    
    items.forEach(function(item) {
        if (item.style.display !== 'none') {
            item.style.opacity = '0';
            item.style.transform = 'scale(0.95)';
            item.style.willChange = 'transform, opacity';
        }
    });
    
    setTimeout(function() {
        items.forEach(function(item) {
            if (category === 'semua' || item.dataset.cat === category) {
                item.style.display = '';
            } else {
                item.style.display = 'none';
            }
        });
        
        requestAnimationFrame(function() {
            requestAnimationFrame(function() {
                items.forEach(function(item) {
                    if (item.style.display !== 'none') {
                        item.style.opacity = '1';
                        item.style.transform = 'scale(1)';
                    }
                });
            });
        });
    }, 200);
}

/* ── LIGHTBOX ── */
const lightbox = document.getElementById('lightbox');
const lbImg = document.getElementById('lb-img');
const lbDots = document.getElementById('lbDots');
const lbCount = document.getElementById('lbCounter');

function buildDots(visible) {
    if (!lbDots || !Array.isArray(visible)) return;
    
    let dotsHTML = '';
    for (let i = 0; i < visible.length; i++) {
        const active = i === lightboxIndex ? ' active' : '';
        dotsHTML += `<div class="lb-dot${active}"></div>`;
    }
    lbDots.innerHTML = dotsHTML;
}

function syncLightboxUI(visible) {
    if (!lbDots || !lbCount) return;
    
    const dots = lbDots.querySelectorAll('.lb-dot');
    dots.forEach(function(dot, i) {
        dot.classList.toggle('active', i === lightboxIndex);
    });
    
    lbCount.textContent = (lightboxIndex + 1) + ' / ' + visible.length;
}

function openLightbox(index, visible) {
    if (!lbImg || !lightbox || !Array.isArray(visible) || !visible.length) return;
    
    lightboxIndex = index;
    lightboxVisible = visible;
    
    const imgSrc = visible[lightboxIndex].querySelector('img');
    if (!imgSrc || !imgSrc.src) return;
    
    lbImg.classList.remove('fade-out', 'fade-in');
    lbImg.src = fixImgUrl(imgSrc.src);
    lbImg.classList.add('fade-in');
    
    lightbox.classList.add('active');
    document.body.classList.add('no-scroll');
    buildDots(lightboxVisible);
    syncLightboxUI(lightboxVisible);
    
    try {
        history.pushState({ lightbox: true }, '');
    } catch (e) {
        // Ignore history errors
    }
}

function closeLightbox() {
    if (!lightbox) return;
    
    lightbox.classList.remove('active');
    document.body.classList.remove('no-scroll');

    if (history.state && history.state.lightbox) {
        history.back();
    }
}

function goTo(direction) {
    if (lightboxBusy || lightboxVisible.length < 2 || !lbImg) return;
    
    lightboxBusy = true;
    lbImg.classList.add('fade-out');
    lbImg.classList.remove('fade-in');
    
    setTimeout(function() {
        lightboxIndex = (lightboxIndex + direction + lightboxVisible.length) % lightboxVisible.length;
        
        const imgSrc = lightboxVisible[lightboxIndex].querySelector('img');
        if (imgSrc && imgSrc.src) {
            lbImg.src = fixImgUrl(imgSrc.src);
        }
        
        lbImg.classList.remove('fade-out');
        lbImg.classList.add('fade-in');
        syncLightboxUI(lightboxVisible);
        
        setTimeout(function() {
            lightboxBusy = false;
        }, 230);
    }, 200);
}

if (document.getElementById('lbClose')) {
    document.getElementById('lbClose').addEventListener('click', closeLightbox);
}

if (lightbox) {
    lightbox.addEventListener('click', function(e) {
        if (e.target === lightbox) {
            closeLightbox();
        }
    });
}

if (document.getElementById('lbPrev')) {
    document.getElementById('lbPrev').addEventListener('click', function(e) {
        e.stopPropagation();
        goTo(-1);
    });
}

if (document.getElementById('lbNextBtn')) {
    document.getElementById('lbNextBtn').addEventListener('click', function(e) {
        e.stopPropagation();
        goTo(1);
    });
}

document.addEventListener('keydown', function(e) {
    if (!lightbox || !lightbox.classList.contains('active')) return;
    
    if (e.key === 'Escape') {
        closeLightbox();
    } else if (e.key === 'ArrowLeft') {
        goTo(-1);
    } else if (e.key === 'ArrowRight') {
        goTo(1);
    }
});

let touchStartX = 0;
let touchStartY = 0;

if (lightbox) {
    lightbox.addEventListener('touchstart', function(e) {
        if (e.touches && e.touches[0]) {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }
    }, { passive: true });
    
    lightbox.addEventListener('touchend', function(e) {
        if (!e.changedTouches || !e.changedTouches[0]) return;
        
        const dx = e.changedTouches[0].clientX - touchStartX;
        const dy = e.changedTouches[0].clientY - touchStartY;
        
        if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 1.5) {
            goTo(dx < 0 ? 1 : -1);
        }
    });
}

window.addEventListener('popstate', function() {
    if (lightbox && lightbox.classList.contains('active')) {
        closeLightbox();
    }
});

const revealObserver = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry, index) {
        if (entry.isIntersecting) {
            setTimeout(function() {
                entry.target.classList.add('visible');
            }, index * 55);
            revealObserver.unobserve(entry.target);

    });

const LOAD_TIMEOUT_MS = 5000;
let configLoaded = false;

function hideLoader() {

        loader.classList.add('hidden');
        setTimeout(function() {
            if (loader.parentNode) {
                loader.parentNode.removeChild(loader);

function applyConfig(config) {
    if (!config || typeof config !== 'object') {
        config = DEFAULT;
    }
    
    try {
        document.title = config.meta?.title || DEFAULT.meta.title;
        applyColors(config.theme?.colors || DEFAULT.theme.colors);
        
        const mode = config.theme?.mode || 'dark';
        document.querySelectorAll('.theme-btn').forEach(function(btn) {

        });

        safeSetText(document.getElementById('hero-name'), config.hero?.name || '');

        if (profileImg) {

        const heroBg = document.getElementById('hero-bg');
        if (heroBg) {
            heroBg.style.backgroundImage = 'url(\'' + fixImgUrl(config.hero?.bgUrl || DEFAULT.hero.bgUrl) + '\')';
        }
        
        safeSetText(document.getElementById('about-title'), config.about?.title || '');

        safeSetText(document.getElementById('about-p2'), config.about?.text2 || '');
        
        const aboutImg = document.getElementById('about-img');
        if (aboutImg) {

        }
        
        const statsContainer = document.getElementById('about-stats');
        if (statsContainer) {
            const stats = Array.isArray(config.about?.stats) ? config.about.stats : DEFAULT.about.stats;
            let statsHTML = '';
            for (const stat of stats) {
                if (!stat || typeof stat !== 'object') continue;
                const safeValue = sanitizeText(stat.value || '');
                const safeLabel = sanitizeText(stat.label || '');
                statsHTML += '<div class="about-stat"><strong>' + safeValue + '</strong><span>' + safeLabel + '</span></div>';
            }
            safeSetHTML(statsContainer, statsHTML);
        }
        
        const galleryItems = config.gallery?.items || [];
        renderGallery(galleryItems, true);
        
        safeSetText(document.getElementById('footer-text'), config.footer?.text || '');
        
        const cached = loadCache();
        if (!cached) {

        }
        
    } catch (err) {
        console.error('Error applying config:', err);
        applyConfig(DEFAULT);
    }
}

/* ── LOAD CONFIG WITH GUARANTEED COMPLETION ── */
function saveCache(data) {
    try {
        localStorage.setItem('site_config', JSON.stringify(data));
    } catch {}
}

function loadCache() {
    try {
        const data = localStorage.getItem('site_config');
        return data ? JSON.parse(data) : null;
    } catch {
        return null;
    }
}

function loadConfig() {
    const controller = new AbortController();
    let timeoutReached = false;

    const cached = loadCache();
    if (cached && !configLoaded) {
        applyConfig(cached);
    }
    
    const forceHideTimeout = setTimeout(function() {
        if (!configLoaded) {
            console.warn('Force hiding loader after timeout');
            timeoutReached = true;
            applyConfig(DEFAULT);
            hideLoader();
        }
    }, LOAD_TIMEOUT_MS + 1000);
    
    const fetchTimeout = setTimeout(function() {
        if (!configLoaded) {
            console.warn('Fetch timeout, using default config');
            controller.abort();
            if (!timeoutReached) {
                applyConfig(DEFAULT);
                hideLoader();
            }
            clearTimeout(forceHideTimeout);
        }
    }, LOAD_TIMEOUT_MS);
    
    fetch('./data.json', {
    signal: controller.signal,
    cache: 'no-store',
    headers: { 'Accept': 'application/json' }
})
    .then(function(response) {
        clearTimeout(fetchTimeout);
        
        if (!response.ok) {
            throw new Error('HTTP error ' + response.status);
        }
        return response.json();
    })
    .then(function(config) {
        if (!configLoaded) {
            saveCache(config);
            applyConfig(config);
            // Track versi untuk deteksi update
            if (config && config.version) {
                _currentVersion = String(config.version);
            }
            setTimeout(function() {
                hideLoader();
                clearTimeout(forceHideTimeout);
            }, 300);
        }
    })
    .catch(function(error) {
        if (!configLoaded) {
            console.warn('Config load failed:', error.message);
            const cachedConfig = loadCache();
            if (cachedConfig) {
                applyConfig(cachedConfig);
            } else {
                applyConfig(DEFAULT);
            }
            setTimeout(function() {
                hideLoader();
                clearTimeout(forceHideTimeout);
            }, 300);
        }
    });
}

function applyUpdateFromSW(data) {
  if (!data || typeof data !== 'object') return;
  const newVer = String(data.version || '0');
  // Hanya apply jika memang versi beda
  if (_currentVersion && _currentVersion === newVer) return;
  try {
    applyConfig(data);
    saveCache(data);
    _currentVersion = newVer;
    showUpdateToast();
  } catch (e) {
    console.warn('[App] Gagal apply update:', e);
  }
}

/* ═══════════════════════════════════════════════════════════
   CLIENT-SIDE VERSION POLL (backup jika SW tidak aktif)
   Fetch data.json tiap kali tab aktif kembali
═══════════════════════════════════════════════════════════ */
function pollVersion() {
  fetch('./data.json', { cache: 'no-store' })
    .then(r => r.ok ? r.json() : null)
    .then(data => { if (data) applyUpdateFromSW(data); })
    .catch(() => {});
}

document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') pollVersion();
});

/* ═══════════════════════════════════════════════════════════
   SERVICE WORKER
═══════════════════════════════════════════════════════════ */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js', { scope: './' })
    .then(reg => {
      setInterval(() => reg.update().catch(() => {}), 60_000);
    })
    .catch(err => console.debug('[App] SW gagal:', err.message));

  navigator.serviceWorker.addEventListener('message', evt => {
    if (evt.data?.type === 'VERSION_UPDATE') {
      applyUpdateFromSW(evt.data.data);
    }
  });
}
</script>
